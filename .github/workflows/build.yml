name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  macos:
    name: Build macOS (.app)
    runs-on: macos-26
    permissions:
      contents: write

    env:
      # When secrets are absent (e.g. PR from a fork) we fall back to ad-hoc.
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.MACOS_DEVELOPER_ID != '' }}
      # Notarisation runs only for tagged releases AND when Apple-ID secrets exist.
      DO_NOTARIZE: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "Xcode 26 not found. Available:"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Import Developer ID certificate
        if: env.HAS_SIGNING == 'true'
        env:
          CERT_B64: ${{ secrets.MACOS_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | xargs)
          rm -f "$CERT_PATH"

      - name: Build Logram.app (signed)
        if: env.HAS_SIGNING == 'true'
        env:
          DEV_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project Logram.xcodeproj \
            -scheme Logram \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$DEV_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            clean build

      - name: Build Logram.app (ad-hoc)
        if: env.HAS_SIGNING != 'true'
        run: |
          xcodebuild \
            -project Logram.xcodeproj \
            -scheme Logram \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            clean build

      - name: Notarize and staple
        if: env.DO_NOTARIZE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          cd build
          ditto -c -k --sequesterRsrc --keepParent Logram.app Logram-notary.zip

          # Submit, capture submission ID, then poll status separately so we
          # can fetch the detailed Apple log when (not "if") something fails.
          SUBMIT_OUT=$(xcrun notarytool submit Logram-notary.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)
          echo "$SUBMIT_OUT"

          SUB_ID=$(echo "$SUBMIT_OUT"  | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')
          STATUS=$(echo "$SUBMIT_OUT" | python3 -c 'import sys,json;print(json.load(sys.stdin)["status"])')

          echo "::group::Notarization log ($SUB_ID, status=$STATUS)"
          xcrun notarytool log "$SUB_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true
          echo "::endgroup::"

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS — see log above."
            exit 1
          fi

          xcrun stapler staple Logram.app
          rm -f Logram-notary.zip

      - name: Package Logram.app
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent Logram.app ../Logram-macos.zip

      - name: Cleanup keychain
        if: always() && env.HAS_SIGNING == 'true'
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Logram-macos
          path: Logram-macos.zip

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Logram-macos.zip
          generate_release_notes: true
          body: |
            ## macOS

            Приложение подписано Developer ID Application и нотарифицировано Apple — запускается обычным двойным кликом, без Gatekeeper-предупреждений.

            Установка: распакуйте `Logram-macos.zip`, перетащите `Logram.app` в `/Applications`.

            ## Windows

            Распакуйте `Logram-windows.zip`, запустите `Logram.exe`. SmartScreen может показать предупреждение — **More info** → **Run anyway**.

            ## Linux

            ```bash
            sudo apt install ./logram_1.2.0_amd64.deb
            ```

            Появляется в Activities, ассоциируется с `.log` файлами (правый клик → Open With Logram). Удаление — `sudo apt remove logram`. Требует Ubuntu 24.04+ или другой Debian-based дистрибутив с GTK 4.14+.

            ---

  windows:
    name: Build Windows (.exe)
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        working-directory: LogramWin
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        working-directory: LogramWin
        run: cmake --build build --config Release

      - name: Run parser tests
        working-directory: LogramWin/build
        run: ctest -C Release --output-on-failure

      - name: Package Logram.exe
        working-directory: LogramWin/build/Release
        shell: pwsh
        run: Compress-Archive -Path Logram.exe -DestinationPath $env:GITHUB_WORKSPACE\Logram-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Logram-windows
          path: Logram-windows.zip

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Logram-windows.zip

  linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libgtk-4-dev

      - name: Configure CMake
        working-directory: LogramLinux
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: LogramLinux
        run: cmake --build build

      - name: Run parser tests
        working-directory: LogramLinux/build
        run: ctest --output-on-failure

      - name: Strip binary
        run: strip LogramLinux/build/Logram

      - name: Build .deb package
        working-directory: LogramLinux/build
        run: |
          cpack -G DEB
          ls -la *.deb
          cp *.deb "$GITHUB_WORKSPACE/"

      - name: Verify package
        run: |
          DEB=$(ls "$GITHUB_WORKSPACE"/logram_*.deb)
          echo "::group::dpkg -I $DEB"
          dpkg -I "$DEB"
          echo "::endgroup::"
          echo "::group::dpkg -c $DEB (contents)"
          dpkg -c "$DEB"
          echo "::endgroup::"
          # Smoke install in CI to catch missing deps before users do.
          sudo apt-get install -y "$DEB"
          which Logram
          file "$(which Logram)"
          sudo apt-get remove -y logram

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Logram-linux
          path: logram_*.deb

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: logram_*.deb