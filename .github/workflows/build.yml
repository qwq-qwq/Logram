name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  macos:
    name: Build macOS (.app)
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "Xcode 26 not found. Available:"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Build Logram.app
        run: |
          xcodebuild \
            -project Logram.xcodeproj \
            -scheme Logram \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            clean build

      - name: Package Logram.app
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent Logram.app ../Logram-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Logram-macos
          path: Logram-macos.zip

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Logram-macos.zip
          generate_release_notes: true
          body: |
            ## macOS

            Приложение подписано ad-hoc (без Apple Developer ID), поэтому при первом запуске macOS скажет, что файл «повреждён». Это карантин Gatekeeper — снимается одной командой в Терминале после того, как перетащили `Logram.app` в `/Applications`:

            ```bash
            xattr -dr com.apple.quarantine /Applications/Logram.app
            ```

            После этого приложение запускается обычным двойным кликом.

            ## Windows

            Распакуйте `Logram-windows.zip`, запустите `Logram.exe`. SmartScreen может показать предупреждение — **More info** → **Run anyway**.

            ---

  windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        working-directory: LogramWin
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        working-directory: LogramWin
        run: cmake --build build --config Release

      - name: Run parser tests
        working-directory: LogramWin/build
        run: ctest -C Release --output-on-failure

      - name: Package Logram.exe
        working-directory: LogramWin/build/Release
        shell: pwsh
        run: Compress-Archive -Path Logram.exe -DestinationPath $env:GITHUB_WORKSPACE\Logram-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Logragm-windows
          path: Logram-windows.zip

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Logram-windows.zip